name: ARC Occupancy Logger
on:
  schedule:
    - cron: "*/30 * * * *"   # every 30 minutes
  workflow_dispatch:

permissions:
  contents: write

jobs:
  log:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the data branch
        uses: actions/checkout@v4
        with:
          ref: data           # check out data branch directly
          fetch-depth: 0

      - name: Create data branch if it doesn't exist
        run: |
          # If 'data' didn't exist, checkout above may have failed to get it;
          # ensure we're on a data branch based on main's files.
          git rev-parse --verify data >/dev/null 2>&1 || git checkout -b data

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Ensure logger script present
        run: |
          # arc_logger.py lives on main; fetch just that file onto this branch.
          git fetch origin main
          git checkout origin/main -- arc_logger.py

      - name: Run logger
        run: python arc_logger.py --once

      - name: Commit new data
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add arc_occupancy.csv
          git commit -m "Log occupancy $(date -u +'%Y-%m-%d %H:%M UTC')" || echo "No changes"
          git push origin HEAD:data
