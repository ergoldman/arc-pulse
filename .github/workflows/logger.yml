name: ARC Occupancy Logger
on:
  schedule:
    - cron: "*/15 * * * *"   # every 15 minutes
  workflow_dispatch:           # lets you run it manually too

# Give the workflow permission to push to the repo
permissions:
  contents: write

jobs:
  log:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo (main)
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run logger
        run: python arc_logger.py --once

      # Commit the CSV to a SEPARATE 'data' branch so it does NOT trigger
      # a GitHub Pages deploy (Pages only deploys from main). This keeps the
      # site deploy stable while data updates every 15 min on its own branch.
      - name: Commit new data to data branch
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          # Fetch or create the data branch
          git fetch origin data || true
          if git show-ref --verify --quiet refs/remotes/origin/data; then
            git checkout -B data origin/data
            # bring over the freshly written csv from the main checkout
            git checkout main -- arc_occupancy.csv 2>/dev/null || true
          else
            git checkout -B data
          fi
          git add arc_occupancy.csv
          git commit -m "Log occupancy $(date -u +'%Y-%m-%d %H:%M UTC')" || echo "No changes"
          git push origin data
