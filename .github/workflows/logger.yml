name: ARC Occupancy Logger
on:
  schedule:
    - cron: "*/30 * * * *"   # backup schedule (GitHub cron is unreliable)
  workflow_dispatch:          # manual "Run workflow" button
  repository_dispatch:        # reliable external trigger (cron-job.org)
    types: [run-logger]

permissions:
  contents: write

jobs:
  log:
    runs-on: ubuntu-latest
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Seed CSV from data branch if it exists
        run: |
          git fetch origin data || true
          if git cat-file -e origin/data:arc_occupancy.csv 2>/dev/null; then
            git show origin/data:arc_occupancy.csv > arc_occupancy.csv
          fi
          if git cat-file -e origin/data:notif_state.json 2>/dev/null; then
            git show origin/data:notif_state.json > notif_state.json
          fi
          if git cat-file -e origin/data:hours.json 2>/dev/null; then
            git show origin/data:hours.json > hours.json
          fi

      - name: Run logger (appends a new reading)
        run: python arc_logger.py --once

      - name: Scrape ARC hours (updates hours.json)
        run: python scrape_hours.py || echo "hours scrape failed, continuing"

      - name: Install push dependencies
        run: pip install pywebpush requests

      - name: Send notifications (closing/opening/quiet/holiday)
        run: python send_notifications.py || echo "notifications step failed, continuing"
        env:
          VAPID_PRIVATE_KEY_PEM: ${{ secrets.VAPID_PRIVATE_KEY_PEM }}
          VAPID_CLAIM_EMAIL: ${{ secrets.VAPID_CLAIM_EMAIL }}
          JSONBIN_ID: ${{ secrets.JSONBIN_ID }}
          JSONBIN_KEY: ${{ secrets.JSONBIN_KEY }}

      - name: Commit data + hours to the data branch
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          # Stash the two output files completely outside the git working tree.
          mkdir -p /tmp/out
          cp arc_occupancy.csv /tmp/out/arc_occupancy.csv
          cp hours.json /tmp/out/hours.json 2>/dev/null || true
          cp notif_state.json /tmp/out/notif_state.json 2>/dev/null || true

          # Move to a SEPARATE clean directory and do all branch work there,
          # so nothing in the current working tree can cause a checkout conflict.
          cd /tmp
          rm -rf datawork
          git clone --branch data "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" datawork 2>/dev/null \
            || git clone "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" datawork
          cd datawork
          # If data branch didn't exist, create it as an orphan
          git checkout data 2>/dev/null || git checkout --orphan data
          # Copy the fresh outputs in
          cp /tmp/out/arc_occupancy.csv arc_occupancy.csv
          cp /tmp/out/hours.json hours.json 2>/dev/null || true
          cp /tmp/out/notif_state.json notif_state.json 2>/dev/null || true
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add arc_occupancy.csv hours.json notif_state.json
          git commit -m "Log occupancy $(date -u +'%Y-%m-%d %H:%M UTC')" || echo "No changes"
          git push origin data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
