name: ARC Occupancy Logger
on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  log:
    runs-on: ubuntu-latest
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Seed CSV from data branch if it exists
        run: |
          git fetch origin data || true
          if git cat-file -e origin/data:arc_occupancy.csv 2>/dev/null; then
            git show origin/data:arc_occupancy.csv > arc_occupancy.csv
          fi

      - name: Run logger (appends a new reading)
        run: python arc_logger.py --once

      - name: Scrape ARC hours (updates hours.json)
        run: python scrape_hours.py || echo "hours scrape failed, continuing"

      - name: Commit data + hours to the data branch
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          # Save outputs OUTSIDE the repo so branch switching can't conflict
          cp arc_occupancy.csv /tmp/arc_occupancy.csv
          cp hours.json /tmp/hours.json 2>/dev/null || true
          # Remove the untracked/modified files from the working tree entirely,
          # so 'checkout' to the data branch has nothing to overwrite.
          rm -f arc_occupancy.csv hours.json
          git checkout -- . 2>/dev/null || true
          git clean -fd 2>/dev/null || true
          # Switch to (or create) the data branch cleanly
          git fetch origin data || true
          if git show-ref --verify --quiet refs/remotes/origin/data; then
            git checkout -B data origin/data
          else
            git checkout -B data
          fi
          # Restore the saved outputs and commit them
          cp /tmp/arc_occupancy.csv arc_occupancy.csv
          cp /tmp/hours.json hours.json 2>/dev/null || true
          git add arc_occupancy.csv hours.json
          git commit -m "Log occupancy $(date -u +'%Y-%m-%d %H:%M UTC')" || echo "No changes"
          git push origin data
